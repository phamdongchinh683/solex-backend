server:
  port: 8080

spring:
  profiles:
    active: dev

  application:
    name: solex-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "DEALLOCATE ALL"
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      leak-detection-threshold: 60000
      data-source-properties:
        preparedStatementCacheQueries: 0
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      url: ${REDIS_URL:}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3155760000000

resend:
  api-key: ${RESEND_API_KEY}

esms:
  api-key: ${ESMS_API_KEY}
  secret: ${ESMS_SECRET}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  connect:
    return-url: ${STRIPE_CONNECT_RETURN_URL:http://localhost:3000/operator/stripe/return}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:}
  hash-secret: ${VNPAY_HASH_SECRET:}
  payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}

openroute-service:
  api-key: ${OPENROUTE_API_KEY:}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html